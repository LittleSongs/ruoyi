services:
  mysql:
    image: mysql:8.4
    container_name: ruoyi-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ry-vue}
      MYSQL_USER: ${MYSQL_USER:-ruoyi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ruoyi123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ruoyi-net

  redis:
    image: redis:7.4-alpine
    container_name: ruoyi-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - ruoyi-net

  backend:
    image: eclipse-temurin:17-jre
    container_name: ruoyi-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    working_dir: /app
    command: ["java", "-jar", "/app/ruoyi-admin.jar"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      RUOYI_PROFILE: /data/profile
      SPRING_DATASOURCE_DRUID_MASTER_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ry-vue}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_DRUID_MASTER_USERNAME: ${MYSQL_USER:-ruoyi}
      SPRING_DATASOURCE_DRUID_MASTER_PASSWORD: ${MYSQL_PASSWORD:-ruoyi123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./artifacts/backend/ruoyi-admin.jar:/app/ruoyi-admin.jar:ro
      - ./data/profile:/data/profile
      - ./logs/backend:/logs
    networks:
      - ruoyi-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ruoyi-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./artifacts/frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - ruoyi-net

networks:
  ruoyi-net:
    driver: bridge
